<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>amure-db</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#0d1117;color:#c9d1d9;height:100vh;overflow:hidden}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#0d1117}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#484f58}

/* Header */
.header{background:#161b22;padding:0 20px;border-bottom:1px solid #30363d;display:flex;align-items:center;gap:12px;height:48px;flex-shrink:0}
.header h1{font-size:17px;color:#58a6ff;cursor:pointer;white-space:nowrap;user-select:none}
.header h1:hover{color:#79c0ff}
.search-box{background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:6px 12px;border-radius:6px;font-size:14px;width:320px;transition:border-color .2s}
.search-box:focus{outline:none;border-color:#58a6ff}
.hdr-stats{font-size:13px;color:#8b949e;margin-left:auto;display:flex;gap:14px;white-space:nowrap}
.hdr-stats span{color:#58a6ff}
.btn{padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:opacity .15s}
.btn:hover{opacity:0.85}
.b-blue{background:#1f6feb;color:#fff}
.b-green{background:#238636;color:#fff}
.b-orange{background:#9e6a03;color:#fff}
.b-red{background:#da3633;color:#fff}
.b-ghost{background:transparent;color:#8b949e;border:1px solid #30363d}
.b-ghost:hover{color:#c9d1d9;border-color:#484f58}

/* Layout */
.layout{display:flex;height:calc(100vh - 48px);overflow:hidden}

/* Sidebar */
.sidebar{width:260px;background:#161b22;border-right:1px solid #30363d;overflow-y:auto;flex-shrink:0;padding:12px;display:flex;flex-direction:column;gap:4px}
.sidebar-section-title{font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:.5px;padding:10px 0 4px;font-weight:600}
.toc-item{padding:6px 10px;border-radius:5px;cursor:pointer;font-size:13px;color:#c9d1d9;text-decoration:none;display:flex;align-items:center;gap:6px;transition:background .15s}
.toc-item:hover{background:#1f6feb22}
.toc-item .toc-count{margin-left:auto;font-size:11px;color:#8b949e;background:#21262d;padding:1px 6px;border-radius:8px}
.toc-item .toc-dot{width:4px;height:16px;border-radius:2px;flex-shrink:0}
.recent-item{padding:5px 10px;border-radius:5px;cursor:pointer;font-size:12px;color:#8b949e;display:flex;align-items:center;gap:6px;transition:background .15s;overflow:hidden}
.recent-item:hover{background:#1f6feb22;color:#c9d1d9}
.recent-item .ri-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.recent-item .ri-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sidebar-kind-stat{padding:6px 10px;font-size:13px;display:flex;align-items:center;gap:8px}
.sidebar-kind-stat .sk-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sidebar-kind-stat .sk-count{margin-left:auto;color:#8b949e;font-size:12px}

/* Main content */
.main-content{flex:1;overflow-y:auto;padding:0}
.content-inner{max-width:900px;margin:0 auto;padding:24px 32px 60px}

/* Breadcrumb */
.breadcrumb{display:flex;align-items:center;gap:4px;font-size:12px;color:#8b949e;margin-bottom:16px;flex-wrap:wrap}
.breadcrumb a{color:#58a6ff;cursor:pointer;text-decoration:none}
.breadcrumb a:hover{text-decoration:underline}
.breadcrumb .bc-sep{color:#484f58}

/* Nav buttons */
.nav-bar{display:flex;align-items:center;gap:6px;margin-bottom:12px}
.nav-btn{background:#21262d;border:1px solid #30363d;color:#8b949e;padding:4px 10px;border-radius:5px;cursor:pointer;font-size:12px;transition:all .15s}
.nav-btn:hover{color:#c9d1d9;border-color:#484f58}
.nav-btn:disabled{opacity:.3;cursor:default}

/* Home view */
.home-search{text-align:center;padding:60px 0 40px}
.home-search h2{font-size:24px;color:#c9d1d9;margin-bottom:16px;font-weight:400}
.home-search-input{background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:12px 20px;border-radius:8px;font-size:16px;width:100%;max-width:560px;transition:border-color .2s}
.home-search-input:focus{outline:none;border-color:#58a6ff}

/* Kind group */
.kind-group{margin-bottom:20px}
.kind-group-header{display:flex;align-items:center;gap:8px;padding:10px 0;cursor:pointer;user-select:none;border-bottom:1px solid #21262d}
.kind-group-header:hover{border-bottom-color:#30363d}
.kind-group-header .kg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.kind-group-header h3{font-size:15px;font-weight:600;color:#c9d1d9}
.kind-group-header .kg-count{font-size:13px;color:#8b949e}
.kind-group-header .kg-toggle{margin-left:auto;color:#484f58;font-size:12px;transition:transform .2s}
.kind-group-header.collapsed .kg-toggle{transform:rotate(-90deg)}
.kind-group-list{padding:4px 0}
.kind-group-header.collapsed+.kind-group-list{display:none}

/* Node card (list item) */
.node-card{display:flex;align-items:center;gap:10px;padding:10px 12px;margin:2px 0;border-radius:6px;cursor:pointer;border:1px solid transparent;transition:all .15s}
.node-card:hover{background:#161b22;border-color:#30363d}
.node-card .nc-kind{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.node-card .nc-statement{flex:1;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.node-card .nc-status{font-size:10px;padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.node-card .nc-keywords{display:flex;gap:3px;flex-shrink:0}
.node-card .nc-keywords span{font-size:10px;background:#21262d;color:#8b949e;padding:1px 5px;border-radius:3px}
.node-card.failed{opacity:.55}
.node-card.failed .nc-statement{text-decoration:line-through}

/* Search result card */
.search-result-card{display:flex;align-items:center;gap:10px;padding:10px 12px;margin:2px 0;border-radius:6px;cursor:pointer;border:1px solid transparent;transition:all .15s}
.search-result-card:hover{background:#161b22;border-color:#30363d}
.search-result-card .src-score{font-size:11px;background:#1f6feb33;color:#58a6ff;padding:2px 8px;border-radius:10px;flex-shrink:0}

/* Wiki page */
.wiki-header{margin-bottom:24px}
.wiki-badges{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.wiki-kind-badge{font-size:13px;font-weight:700;padding:4px 12px;border-radius:5px}
.wiki-status-badge{font-size:12px;padding:3px 10px;border-radius:12px;font-weight:500}
.wiki-title{font-size:22px;font-weight:600;line-height:1.4;margin:12px 0 8px;color:#e6edf3}
.wiki-meta{font-size:12px;color:#8b949e;display:flex;flex-direction:column;gap:4px;margin-top:8px}
.wiki-meta-row{display:flex;gap:16px;flex-wrap:wrap}
.wiki-keywords{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
.wiki-keyword{font-size:12px;background:#21262d;color:#58a6ff;padding:3px 10px;border-radius:4px;cursor:pointer;border:1px solid #30363d;transition:all .15s}
.wiki-keyword:hover{background:#1f6feb22;border-color:#58a6ff}
.wiki-metadata{margin-top:12px;background:#161b22;border:1px solid #30363d;border-radius:6px;padding:12px;font-size:13px}
.wiki-metadata table{width:100%;border-collapse:collapse}
.wiki-metadata td{padding:4px 8px;vertical-align:top}
.wiki-metadata td:first-child{color:#8b949e;white-space:nowrap;width:1%}
.wiki-metadata td:last-child{color:#c9d1d9;word-break:break-all}

.wiki-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.status-select{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:4px 8px;border-radius:5px;font-size:12px;cursor:pointer}
.status-select:focus{outline:none;border-color:#58a6ff}

/* Wiki section */
.wiki-section{margin-top:28px}
.wiki-section-heading{font-size:16px;font-weight:600;color:#e6edf3;padding:8px 0;border-left:3px solid #30363d;padding-left:12px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.wiki-section-heading .ws-count{font-size:12px;color:#8b949e;font-weight:400}
.wiki-section-heading[data-color]{border-left-color:var(--section-color)}

/* Connected node item */
.conn-item{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;margin:6px 0;border-radius:8px;cursor:pointer;background:#161b22;border:1px solid #21262d;border-left:4px solid #30363d;transition:all .15s}
.conn-item:hover{border-color:#30363d;background:#1c2128;border-left-color:#484f58}
.conn-item .ci-arrow{color:#484f58;font-size:14px;flex-shrink:0;margin-top:2px}
.conn-item .ci-kind{font-size:10px;font-weight:600;padding:2px 6px;border-radius:3px;flex-shrink:0;margin-top:1px}
.conn-item .ci-body{flex:1;min-width:0}
.conn-item .ci-statement{font-size:14px;color:#c9d1d9;line-height:1.5}
.conn-item .ci-status{font-size:11px;padding:2px 8px;border-radius:8px;margin-left:6px;font-weight:600}
.conn-item .ci-status-icon{margin-right:2px}
.conn-item .ci-note{font-size:12px;color:#484f58;margin-top:4px;font-style:italic}
.conn-item.ci-failed{opacity:.55}
.conn-item.ci-failed .ci-statement{text-decoration:line-through}

/* Status visual indicators */
.status-indicator{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:3px 10px;border-radius:12px;font-weight:600}
.status-indicator.st-draft{color:#8b949e;background:#8b949e22}
.status-indicator.st-active{color:#58a6ff;background:#58a6ff22}
.status-indicator.st-accepted{color:#3fb950;background:#3fb95022}
.status-indicator.st-rejected{color:#f85149;background:#f8514922}
.status-indicator.st-weakened{color:#d29922;background:#d2992222}

/* Recommendation section */
.rec-item{display:flex;align-items:center;gap:10px;padding:8px 14px;margin:4px 0;border-radius:6px;cursor:pointer;background:#161b22;border:1px solid #21262d;border-left:3px solid #484f58;transition:all .15s}
.rec-item:hover{border-color:#30363d;background:#1c2128}

/* Responsive */
@media(max-width:768px){
  .sidebar{display:none}
  .content-inner{padding:16px}
  .header{gap:8px;padding:0 12px}
  .search-box{width:180px}
  .wiki-title{font-size:18px}
  .node-card .nc-keywords{display:none}
}
@media(max-width:480px){
  .hdr-stats{display:none}
  .search-box{width:140px}
}
</style>
</head>
<body>

<div class="header">
  <h1 onclick="goHome()">amure-db</h1>
  <input class="search-box" id="q" placeholder="검색 (동의어 자동 확장)..." onkeydown="if(event.key==='Enter')doSearch()">
  <select id="kind-filter" style="background:#0d1117;border:1px solid #30363d;color:#8b949e;padding:6px 10px;border-radius:6px;font-size:13px;cursor:pointer">
    <option value="">전체 타입</option>
    <option value="Claim">Claim</option>
    <option value="Reason">Reason</option>
    <option value="Evidence">Evidence</option>
    <option value="Experiment">Experiment</option>
  </select>
  <select id="status-filter" style="background:#0d1117;border:1px solid #30363d;color:#8b949e;padding:6px 10px;border-radius:6px;font-size:13px;cursor:pointer">
    <option value="">전체 상태</option>
    <option value="Draft">○ Draft</option>
    <option value="Active">◉ Active</option>
    <option value="Accepted">✓ Accepted</option>
    <option value="Rejected">✗ Rejected</option>
    <option value="Weakened">△ Weakened</option>
  </select>
  <button class="btn b-blue" onclick="doSearch()">검색</button>
  <div class="hdr-stats">
    <div>노드 <span id="sn">0</span></div>
    <div>엣지 <span id="se">0</span></div>
  </div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-content" id="main">
    <div class="content-inner" id="content"></div>
  </div>
</div>

<script>
const API='';
const KC={Claim:'#58a6ff',Reason:'#d2a8ff',Evidence:'#8b949e',Experiment:'#f0883e'};
const SC={Draft:'#8b949e',Active:'#58a6ff',Accepted:'#3fb950',Rejected:'#f85149',Weakened:'#d29922'};
const EKC={Support:'#3fb950',Rebut:'#f85149',DependsOn:'#484f58',Contradicts:'#f85149',Refines:'#58a6ff',DerivedFrom:'#f0883e'};
const KIND_LABELS={Claim:'Claim',Reason:'Reason',Evidence:'Evidence',Experiment:'Experiment'};
const EDGE_LABELS={Support:'지지',Rebut:'반론',DependsOn:'의존',Contradicts:'충돌',Refines:'구체화',DerivedFrom:'파생'};

let allNodes=[], allEdges=[];
let history=[], historyIdx=-1;
let recentVisits=[];
let currentView='home'; // 'home' | 'node' | 'search'
let currentNodeId=null;

// --- API helpers ---
async function api(p){const r=await fetch(API+p);return r.json()}
async function post(p,b){return(await fetch(API+p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)})).json()}
async function patch(p,b){return(await fetch(API+p,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)})).json()}
async function del(p){return fetch(API+p,{method:'DELETE'})}

// --- Data ---
async function loadAll(){
  const d=await api('/api/graph/all');
  allNodes=d.nodes||[];
  allEdges=d.edges||[];
  document.getElementById('sn').textContent=allNodes.length;
  document.getElementById('se').textContent=allEdges.length;
}

function findNode(id){return allNodes.find(n=>n.id===id)}
function getEdgesFor(id){return allEdges.filter(e=>e.source===id||e.target===id)}

// --- Navigation ---
function navigate(nodeId, pushHistory){
  if(pushHistory!==false){
    if(historyIdx<history.length-1) history=history.slice(0,historyIdx+1);
    history.push(nodeId);
    historyIdx=history.length-1;
  }
  if(nodeId===null){
    currentView='home';
    currentNodeId=null;
    window.location.hash='';
    renderHome();
    renderSidebar();
  } else {
    currentView='node';
    currentNodeId=nodeId;
    window.location.hash=nodeId;
    addRecentVisit(nodeId);
    renderNodePage(nodeId).catch(e=>{
      document.getElementById('content').innerHTML='<div style="padding:40px;color:#f85149">오류: '+e.message+'</div>';
    });
    renderSidebar();
  }
  document.getElementById('main').scrollTop=0;
}

function goHome(){navigate(null,true)}

function goBack(){
  if(historyIdx>0){
    historyIdx--;
    const id=history[historyIdx];
    navigate(id,false);
  }
}

function goForward(){
  if(historyIdx<history.length-1){
    historyIdx++;
    const id=history[historyIdx];
    navigate(id,false);
  }
}

function addRecentVisit(id){
  recentVisits=recentVisits.filter(r=>r!==id);
  recentVisits.unshift(id);
  if(recentVisits.length>10) recentVisits=recentVisits.slice(0,10);
}

// --- Hash routing ---
window.addEventListener('hashchange',function(){
  const h=window.location.hash.slice(1);
  if(h && h!==currentNodeId){
    navigate(h,true);
  } else if(!h && currentView!=='home' && currentView!=='search'){
    navigate(null,true);
  }
});

// --- Render: Sidebar ---
function renderSidebar(){
  const sb=document.getElementById('sidebar');
  let h='';
  if(currentView==='node' && currentNodeId){
    h+=renderSidebarTOC(currentNodeId);
  } else {
    h+=renderSidebarKindStats();
  }
  h+=renderSidebarRecent();
  sb.innerHTML=h;
}

function renderSidebarKindStats(){
  const counts={};
  allNodes.forEach(n=>{counts[n.kind]=(counts[n.kind]||0)+1});
  let h='<div class="sidebar-section-title">노드 종류별 현황</div>';
  for(const kind of ['Claim','Reason','Evidence','Experiment']){
    const c=counts[kind]||0;
    h+='<div class="sidebar-kind-stat"><div class="sk-dot" style="background:'+KC[kind]+'"></div>'+kind+'<span class="sk-count">'+c+'</span></div>';
  }
  return h;
}

function renderSidebarTOC(nodeId){
  const node=findNode(nodeId);
  if(!node) return '';
  const edges=getEdgesFor(nodeId);
  const sections=buildSections(nodeId,edges);
  let h='<div class="sidebar-section-title">목차</div>';
  h+='<a class="toc-item" href="#sec-info" onclick="scrollToSection(\'sec-info\');return false"><div class="toc-dot" style="background:#58a6ff"></div>기본 정보</a>';
  for(const s of sections){
    if(s.items.length===0) continue;
    h+='<a class="toc-item" href="#sec-'+s.key+'" onclick="scrollToSection(\'sec-'+s.key+'\');return false">';
    h+='<div class="toc-dot" style="background:'+s.color+'"></div>'+s.label;
    h+='<span class="toc-count">'+s.items.length+'</span></a>';
  }
  h+='<a class="toc-item" href="#sec-rec" onclick="scrollToSection(\'sec-rec\');return false"><div class="toc-dot" style="background:#484f58"></div>관련 추천';
  h+='<span class="toc-count" id="toc-rec-count">...</span></a>';
  return h;
}

function renderSidebarRecent(){
  if(recentVisits.length===0) return '';
  let h='<div class="sidebar-section-title" style="margin-top:16px">최근 방문</div>';
  for(const id of recentVisits){
    const n=findNode(id);
    if(!n) continue;
    const c=KC[n.kind]||'#8b949e';
    h+='<div class="recent-item" onclick="navigate(\''+n.id+'\',true)">';
    h+='<div class="ri-dot" style="background:'+c+'"></div>';
    h+='<div class="ri-text">'+esc(n.statement.substring(0,40))+(n.statement.length>40?'...':'')+'</div></div>';
  }
  return h;
}

function scrollToSection(id){
  const el=document.getElementById(id);
  if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
}

// --- Render: Home ---
function renderHome(){
  const c=document.getElementById('content');
  let h='';
  h+='<div class="home-search">';
  h+='<h2>amure-db 지식 그래프</h2>';
  h+='<input class="home-search-input" placeholder="검색어를 입력하세요..." onkeydown="if(event.key===\'Enter\'){document.getElementById(\'q\').value=this.value;doSearch()}">';
  h+='</div>';
  const statusFilter=document.getElementById('status-filter').value;
  const kindFilter=document.getElementById('kind-filter').value;
  let filtered=allNodes;
  if(statusFilter) filtered=filtered.filter(n=>n.status===statusFilter);
  if(kindFilter) filtered=filtered.filter(n=>n.kind===kindFilter);
  const groups={};
  filtered.forEach(n=>{if(!groups[n.kind])groups[n.kind]=[];groups[n.kind].push(n)});
  for(const kind of ['Claim','Reason','Evidence','Experiment']){
    const list=groups[kind]||[];
    if(list.length===0) continue;
    h+='<div class="kind-group">';
    h+='<div class="kind-group-header" onclick="toggleKindGroup(this)">';
    h+='<div class="kg-dot" style="background:'+KC[kind]+'"></div>';
    h+='<h3>'+kind+'</h3><span class="kg-count">('+list.length+')</span>';
    h+='<span class="kg-toggle">▼</span></div>';
    h+='<div class="kind-group-list">';
    const show=list.slice(0,50);
    for(const n of show){
      h+=renderNodeCard(n);
    }
    if(list.length>50) h+='<div style="padding:8px 12px;color:#8b949e;font-size:13px">+ '+(list.length-50)+' 개 더...</div>';
    h+='</div></div>';
  }
  c.innerHTML=h;
}

function toggleKindGroup(el){el.classList.toggle('collapsed')}

function renderNodeCard(n){
  const isFailed=n.status==='Rejected'||n.status==='Weakened';
  const kc=KC[n.kind]||'#8b949e';
  const sc=SC[n.status]||'#8b949e';
  let h='<div class="node-card'+(isFailed?' failed':'')+'" onclick="navigate(\''+n.id+'\',true)">';
  h+='<span class="nc-kind" style="color:'+kc+';background:'+kc+'18;border:1px solid '+kc+'33">'+n.kind+'</span>';
  h+='<span class="nc-statement">'+esc(n.statement.substring(0,60))+(n.statement.length>60?'...':'')+'</span>';
  if(n.keywords && n.keywords.length>0){
    h+='<span class="nc-keywords">';
    const kws=n.keywords.slice(0,3);
    for(const k of kws) h+='<span>'+esc(k)+'</span>';
    h+='</span>';
  }
  const icon=STATUS_ICONS[n.status]||'';
  h+='<span class="nc-status" style="color:'+sc+';background:'+sc+'22">'+icon+' '+n.status+'</span>';
  h+='</div>';
  return h;
}

// --- Render: Search ---
async function doSearch(){
  const q=document.getElementById('q').value.trim();
  if(!q){goHome();return}
  const kind=document.getElementById('kind-filter').value;
  const kindParam=kind?'&kind='+encodeURIComponent(kind):'';
  const d=await api('/api/graph/search?q='+encodeURIComponent(q)+'&top_k=10'+kindParam);
  const results=d.results||[];
  currentView='search';
  renderSidebar();
  const c=document.getElementById('content');
  let h=renderNavBar();
  h+='<h2 style="font-size:18px;margin-bottom:16px;color:#e6edf3">검색 결과: "'+esc(q)+'" <span style="color:#8b949e;font-size:14px">('+results.length+'건)</span></h2>';
  if(results.length===0){
    h+='<div style="color:#8b949e;padding:20px 0">검색 결과가 없습니다.</div>';
  } else {
    for(const r of results){
      const n=findNode(r.node_id||r.id)||r;
      const kc=KC[n.kind]||'#8b949e';
      const sc=SC[n.status]||'#8b949e';
      const isFailed=n.status==='Rejected'||n.status==='Weakened';
      h+='<div class="search-result-card'+(isFailed?' failed':'')+'" onclick="navigate(\''+(r.node_id||r.id)+'\',true)">';
      h+='<span class="src-score">'+(r.score||0).toFixed(2)+'</span>';
      h+='<span class="nc-kind" style="color:'+kc+';background:'+kc+'18;border:1px solid '+kc+'33">'+n.kind+'</span>';
      h+='<span class="nc-statement" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14px">'+esc(n.statement)+'</span>';
      h+='<span class="nc-status" style="color:'+sc+';background:'+sc+'22;font-size:10px;padding:2px 8px;border-radius:10px">'+n.status+'</span>';
      h+='</div>';
    }
  }
  c.innerHTML=h;
}

// --- Render: Node Wiki Page ---
async function renderNodePage(nodeId){
  const c=document.getElementById('content');
  c.innerHTML='<div style="padding:40px;color:#8b949e">로딩 중...</div>';

  let node=findNode(nodeId);
  let edgesData;
  try{
    const detail=await api('/api/graph/node/'+nodeId);
    if(detail.node) node=detail.node;
    edgesData=detail.edges||[];
  } catch(e){
    edgesData=getEdgesFor(nodeId).map(e=>{
      const otherId=e.source===nodeId?e.target:e.source;
      const other=findNode(otherId);
      return{...e,other_statement:other?other.statement:'',other_kind:other?other.kind:''};
    });
  }

  if(!node){c.innerHTML='<div style="padding:40px;color:#8b949e">노드를 찾을 수 없습니다.</div>';return}

  const sections=buildSectionsFromEdgeData(nodeId,edgesData);
  const kc=KC[node.kind]||'#8b949e';
  const sc=SC[node.status]||'#8b949e';
  const isFailed=node.status==='Rejected'||node.status==='Weakened';

  let h=renderNavBar();
  h+=renderBreadcrumb();

  // Header
  h+='<div class="wiki-header" id="sec-info">';
  h+='<div class="wiki-badges">';
  h+='<span class="wiki-kind-badge" style="color:'+kc+';background:'+kc+'18;border:1px solid '+kc+'33">'+node.kind+'</span>';
  h+=renderStatusBadge(node.status);
  h+='</div>';
  h+='<div class="wiki-title"'+(isFailed?' style="text-decoration:line-through;opacity:.6"':'')+'>'+esc(node.statement)+'</div>';

  // Keywords
  if(node.keywords && node.keywords.length>0){
    h+='<div class="wiki-keywords">';
    for(const k of node.keywords){
      h+='<span class="wiki-keyword" onclick="event.stopPropagation();document.getElementById(\'q\').value=\''+esc(k)+'\';doSearch()">'+esc(k)+'</span>';
    }
    h+='</div>';
  }

  // Metadata
  if(node.metadata && typeof node.metadata==='object'){
    const keys=Object.keys(node.metadata).filter(k=>k!=='auto_generated');
    if(keys.length>0){
      h+='<div class="wiki-metadata"><table>';
      for(const k of keys){
        let v=node.metadata[k];
        if(typeof v==='object') v=JSON.stringify(v);
        h+='<tr><td>'+esc(k)+'</td><td>'+esc(String(v))+'</td></tr>';
      }
      h+='</table></div>';
    }
  }

  // Dates
  h+='<div class="wiki-meta"><div class="wiki-meta-row">';
  if(node.created_at) h+='<span>생성일: '+formatDate(node.created_at)+'</span>';
  if(node.updated_at) h+='<span>수정일: '+formatDate(node.updated_at)+'</span>';
  h+='</div></div>';

  // Actions
  h+='<div class="wiki-actions">';
  h+='<select class="status-select" onchange="changeStatus(\''+nodeId+'\',this.value)">';
  for(const s of ['Draft','Active','Accepted','Rejected','Weakened']){
    h+='<option value="'+s+'"'+(node.status===s?' selected':'')+'>'+s+'</option>';
  }
  h+='</select>';
  h+='<button class="btn b-red" style="font-size:12px;padding:4px 12px" onclick="deleteNode(\''+nodeId+'\')">삭제</button>';
  h+='</div>';
  h+='</div>'; // end wiki-header

  // Sections
  for(const s of sections){
    if(s.items.length===0) continue;
    h+='<div class="wiki-section" id="sec-'+s.key+'">';
    h+='<div class="wiki-section-heading" style="--section-color:'+s.color+'" data-color>';
    h+=s.label+' <span class="ws-count">('+s.items.length+')</span></div>';
    for(const item of s.items){
      h+=renderConnItem(item);
    }
    h+='</div>';
  }

  // Recommendations placeholder
  h+='<div class="wiki-section" id="sec-rec">';
  h+='<div class="wiki-section-heading" style="--section-color:#484f58" data-color>관련 추천 <span class="ws-count" id="rec-count">로딩...</span></div>';
  h+='<div id="rec-list"><div style="color:#8b949e;font-size:13px;padding:8px">키워드 기반 추천을 불러오는 중...</div></div>';
  h+='</div>';

  c.innerHTML=h;

  // Load recommendations async
  loadRecommendations(node,edgesData);
}

const STATUS_ICONS={Draft:'○',Active:'◉',Accepted:'✓',Rejected:'✗',Weakened:'△'};

function renderStatusBadge(status){
  const sc=SC[status]||'#8b949e';
  const icon=STATUS_ICONS[status]||'';
  const cls='st-'+status.toLowerCase();
  return '<span class="status-indicator '+cls+'"><span class="ci-status-icon">'+icon+'</span>'+status+'</span>';
}

function renderConnItem(item){
  const kc=KC[item.kind]||'#8b949e';
  const isFailed=item.status==='Rejected'||item.status==='Weakened';
  const borderColor=item.edgeColor||kc;
  let h='<div class="conn-item'+(isFailed?' ci-failed':'')+'" style="border-left-color:'+borderColor+'" onclick="navigate(\''+item.nodeId+'\',true)">';
  h+='<span class="ci-kind" style="color:'+kc+';background:'+kc+'18">'+item.kind+'</span>';
  h+='<div class="ci-body">';
  h+='<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
  h+='<span class="ci-statement">'+esc(item.statement)+'</span>';
  h+=renderStatusBadge(item.status||'Draft');
  h+='</div>';
  if(item.note) h+='<div class="ci-note">'+esc(item.note)+'</div>';
  h+='</div></div>';
  return h;
}

async function loadRecommendations(node, edgesData){
  const connIds=new Set();
  connIds.add(node.id);
  edgesData.forEach(e=>{
    const otherId=e.source===node.id?e.target:e.source;
    connIds.add(otherId);
  });

  const keywords=(node.keywords||[]).slice(0,3).join(' ');
  if(!keywords){
    document.getElementById('rec-list').innerHTML='<div style="color:#8b949e;font-size:13px;padding:8px">키워드가 없어 추천을 생성할 수 없습니다.</div>';
    document.getElementById('rec-count').textContent='0';
    const tocRec=document.getElementById('toc-rec-count');
    if(tocRec) tocRec.textContent='0';
    return;
  }

  try{
    const d=await api('/api/graph/search?q='+encodeURIComponent(keywords)+'&top_k=15');
    const results=(d.results||[]).filter(r=>{
      const rid=r.node_id||r.id;
      return !connIds.has(rid);
    }).slice(0,5);

    const el=document.getElementById('rec-list');
    const countEl=document.getElementById('rec-count');
    const tocRec=document.getElementById('toc-rec-count');

    // 추천 로딩 중 다른 노드로 이동한 경우 DOM 요소가 없을 수 있음
    if(!el||!countEl) return;

    if(results.length===0){
      el.innerHTML='<div style="color:#8b949e;font-size:13px;padding:8px">관련 추천 노드가 없습니다.</div>';
      countEl.textContent='0';
      if(tocRec) tocRec.textContent='0';
      return;
    }

    countEl.textContent=results.length+'';
    if(tocRec) tocRec.textContent=results.length+'';

    let rh='';
    for(const r of results){
      const n=findNode(r.node_id||r.id)||r;
      const kc=KC[n.kind]||'#8b949e';
      rh+='<div class="rec-item" onclick="navigate(\''+(r.node_id||r.id)+'\',true)" style="border-left-color:'+kc+'">';
      rh+='<span class="nc-kind" style="color:'+kc+';background:'+kc+'18;border:1px solid '+kc+'33;font-size:10px;padding:2px 6px;border-radius:3px">'+n.kind+'</span>';
      rh+='<span style="flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(n.statement)+'</span>';
      rh+='<span class="src-score" style="font-size:10px">'+(r.score||0).toFixed(2)+'</span>';
      rh+='</div>';
    }
    el.innerHTML=rh;
  } catch(e){
    document.getElementById('rec-list').innerHTML='<div style="color:#8b949e;font-size:13px;padding:8px">추천을 불러오지 못했습니다.</div>';
    document.getElementById('rec-count').textContent='0';
    const tocRec=document.getElementById('toc-rec-count');
    if(tocRec) tocRec.textContent='0';
  }
}

// --- Build sections from edge data ---
function buildSectionsFromEdgeData(nodeId, edgesData){
  const sections=[
    {key:'support-in',label:'지지 근거 (Support)',color:EKC.Support,edgeKind:'Support',dir:'in',items:[]},
    {key:'rebut-in',label:'반론 (Rebut)',color:EKC.Rebut,edgeKind:'Rebut',dir:'in',items:[]},
    {key:'support-out',label:'이 노드가 지지하는',color:EKC.Support,edgeKind:'Support',dir:'out',items:[]},
    {key:'rebut-out',label:'이 노드가 반박하는',color:EKC.Rebut,edgeKind:'Rebut',dir:'out',items:[]},
    {key:'depends-out',label:'이 노드가 의존하는 (DependsOn)',color:EKC.DependsOn,edgeKind:'DependsOn',dir:'out',items:[]},
    {key:'depends-in',label:'이 노드에 의존하는',color:EKC.DependsOn,edgeKind:'DependsOn',dir:'in',items:[]},
    {key:'derived-in',label:'파생된 (DerivedFrom → 이 노드)',color:EKC.DerivedFrom,edgeKind:'DerivedFrom',dir:'in',items:[]},
    {key:'derived-out',label:'이 노드에서 파생 (DerivedFrom)',color:EKC.DerivedFrom,edgeKind:'DerivedFrom',dir:'out',items:[]},
    {key:'refines-in',label:'이 노드를 구체화하는 (Refines)',color:EKC.Refines,edgeKind:'Refines',dir:'in',items:[]},
    {key:'refines-out',label:'이 노드가 구체화하는',color:EKC.Refines,edgeKind:'Refines',dir:'out',items:[]},
    {key:'contradicts',label:'충돌 (Contradicts)',color:EKC.Contradicts,edgeKind:'Contradicts',dir:'both',items:[]},
  ];

  for(const e of edgesData){
    const isSource=e.source===nodeId;
    const isTarget=e.target===nodeId;
    const otherId=isSource?e.target:e.source;
    const otherNode=findNode(otherId);
    const otherStatement=e.other_statement||(otherNode?otherNode.statement:otherId.substring(0,8)+'...');
    const otherKind=e.other_kind||(otherNode?otherNode.kind:'');
    const otherStatus=otherNode?otherNode.status:'';

    const item={
      nodeId:otherId,
      kind:otherKind,
      statement:otherStatement,
      status:otherStatus,
      note:e.note||'',
      arrow:isSource?'→':'←',
      edgeColor:EKC[e.kind]||'#484f58'
    };

    for(const s of sections){
      if(s.edgeKind!==e.kind) continue;
      if(s.dir==='in' && isTarget){ s.items.push(item); break; }
      if(s.dir==='out' && isSource){ s.items.push(item); break; }
      if(s.dir==='both'){ s.items.push(item); break; }
    }
  }
  return sections;
}

function buildSections(nodeId, edges){
  return buildSectionsFromEdgeData(nodeId, edges.map(e=>{
    const otherId=e.source===nodeId?e.target:e.source;
    const other=findNode(otherId);
    return{...e, other_statement:other?other.statement:'', other_kind:other?other.kind:''};
  }));
}

// --- Nav bar ---
function renderNavBar(){
  let h='<div class="nav-bar">';
  h+='<button class="nav-btn" onclick="goBack()"'+(historyIdx<=0?' disabled':'')+'>← 뒤로</button>';
  h+='<button class="nav-btn" onclick="goForward()"'+(historyIdx>=history.length-1?' disabled':'')+'>앞으로 →</button>';
  h+='<button class="nav-btn" onclick="goHome()">🏠 홈</button>';
  h+='</div>';
  return h;
}

function renderBreadcrumb(){
  if(history.length<=1) return '';
  const show=history.slice(Math.max(0,historyIdx-4),historyIdx+1);
  let h='<div class="breadcrumb">';
  h+='<a onclick="goHome()">홈</a><span class="bc-sep">/</span>';
  for(let i=0;i<show.length;i++){
    const id=show[i];
    if(!id) continue;
    const n=findNode(id);
    const label=n?n.statement.substring(0,20)+(n.statement.length>20?'...':''):id.substring(0,8);
    if(i===show.length-1){
      h+='<span style="color:#c9d1d9">'+esc(label)+'</span>';
    } else {
      h+='<a onclick="navigate(\''+id+'\',true)">'+esc(label)+'</a><span class="bc-sep">/</span>';
    }
  }
  h+='</div>';
  return h;
}

// --- Actions ---
async function changeStatus(nodeId, status){
  await patch('/api/graph/node/'+nodeId,{status:status});
  await loadAll();
  renderNodePage(nodeId).catch(e=>{
    document.getElementById('content').innerHTML='<div style="padding:40px;color:#f85149">오류: '+e.message+'</div>';
  });
  renderSidebar();
}

async function deleteNode(nodeId){
  if(!confirm('이 노드를 삭제하시겠습니까?')) return;
  await del('/api/graph/node/'+nodeId);
  await loadAll();
  goHome();
}

// --- Utilities ---
function esc(s){
  if(!s) return '';
  const d=document.createElement('div');
  d.textContent=s;
  return d.innerHTML;
}

function formatDate(d){
  if(!d) return '';
  const dt=new Date(d);
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0')+' '+String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0');
}

// --- Init ---
async function init(){
  await loadAll();
  const hash=window.location.hash.slice(1);
  if(hash){
    navigate(hash,true);
  } else {
    navigate(null,true);
  }
  // 필터 변경 시 홈 뷰 재렌더링
  document.getElementById('status-filter').addEventListener('change',function(){
    if(currentView==='home') renderHome();
  });
  document.getElementById('kind-filter').addEventListener('change',function(){
    if(currentView==='home') renderHome();
  });
}

init();
