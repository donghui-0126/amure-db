<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>amure-db</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.30.4/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;overflow:hidden;height:100vh}
.top{background:#161b22;padding:10px 20px;border-bottom:1px solid #30363d;display:flex;align-items:center;gap:12px;height:50px}
.top h1{font-size:18px;color:#58a6ff}
.top input{background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:6px 12px;border-radius:6px;font-size:14px;width:300px}
.top select{background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:6px 10px;border-radius:6px;font-size:13px;cursor:pointer}
.top .st{font-size:13px;color:#8b949e;margin-left:auto;display:flex;gap:14px}
.top .st span{color:#58a6ff}
.btn{padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500}
.btn:hover{opacity:0.85}
.b-blue{background:#1f6feb;color:#fff}
.b-green{background:#238636;color:#fff}
.b-orange{background:#9e6a03;color:#fff}
.b-red{background:#da3633;color:#fff}
.main{display:flex;height:calc(100vh - 50px)}
.side{width:340px;background:#161b22;border-right:1px solid #30363d;overflow-y:auto;flex-shrink:0;padding:12px}
.side h3{font-size:12px;color:#8b949e;margin:12px 0 6px;text-transform:uppercase;letter-spacing:0.5px}
.ni{padding:6px 8px;margin:2px 0;border-radius:4px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px}
.ni:hover{background:#1f6feb22}
.ni.sel{background:#1f6feb33;border:1px solid #1f6feb}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ni .t{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{font-size:10px;padding:1px 6px;border-radius:8px;background:#30363d}
.canvas{flex:1;position:relative}
#cy{width:100%;height:100%}
.panel{position:absolute;top:10px;right:10px;width:320px;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:14px;font-size:13px;display:none;max-height:80vh;overflow-y:auto;z-index:10}
.panel h3{color:#58a6ff;font-size:15px;margin-bottom:8px}
.panel .kw{display:flex;flex-wrap:wrap;gap:3px;margin:6px 0}
.panel .kw span{background:#30363d;padding:2px 6px;border-radius:3px;font-size:11px}
.ei{padding:4px 6px;margin:2px 0;border-radius:3px;background:#0d1117;font-size:12px;cursor:pointer}
.ei:hover{background:#1f6feb22}
.legend{display:flex;gap:8px;flex-wrap:wrap;font-size:11px;margin-bottom:8px}
.legend .i{display:flex;align-items:center;gap:3px}
.legend .c{width:10px;height:10px;border-radius:50%}
</style>
</head>
<body>
<div class="top">
  <h1>amure-db</h1>
  <input id="q" placeholder="Graph RAG search (동의어 자동 확장)..." onkeydown="if(event.key==='Enter')doSearch()">
  <button class="btn b-blue" onclick="doSearch()">Search</button>
  <select id="layout-select" onchange="changeLayout(this.value)">
    <option value="dagre">Dagre (hierarchical)</option>
    <option value="cose">Cose (force)</option>
    <option value="breadthfirst">Breadthfirst</option>
    <option value="circle">Circle</option>
  </select>
  <button class="btn b-green" onclick="batchYahoo()">Batch Yahoo</button>
  <button class="btn b-orange" onclick="autoOrganize()">Auto Organize</button>
  <div class="st">
    <div>Nodes: <span id="sn">0</span></div>
    <div>Edges: <span id="se">0</span></div>
  </div>
</div>
<div class="main">
  <div class="side">
    <div class="legend">
      <div class="i"><div class="c" style="background:#58a6ff"></div>Claim</div>
      <div class="i"><div class="c" style="background:#d2a8ff"></div>Reason</div>
      <div class="i"><div class="c" style="background:#8b949e"></div>Evidence</div>
      <div class="i"><div class="c" style="background:#f0883e"></div>Experiment</div>
      <div class="i"><div class="c" style="background:#3fb950"></div>Fact</div>
    </div>
    <div style="margin-bottom:8px">
      <input id="ysym" placeholder="Symbol (AAPL, MSFT...)" style="width:60%;background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:4px 8px;border-radius:4px;font-size:12px">
      <button class="btn b-green" style="font-size:11px;padding:4px 8px" onclick="addOne()">+ Add</button>
    </div>
    <div id="sidebar-content"></div>
    <div id="search-results" style="display:none"></div>
  </div>
  <div class="canvas">
    <div id="cy"></div>
    <div class="panel" id="panel"></div>
  </div>
</div>
<script>
const API='';
async function api(p){return(await fetch(API+p)).json()}
async function post(p,b){return(await fetch(API+p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)})).json()}

const KC={Claim:'#58a6ff',Reason:'#d2a8ff',Evidence:'#8b949e',Experiment:'#f0883e',Fact:'#3fb950'};
const EC={Support:'#3fb950',Rebut:'#f85149',DependsOn:'#484f58',Contradicts:'#f85149',Refines:'#58a6ff',DerivedFrom:'#f0883e'};
const SHAPES={Claim:'round-rectangle',Reason:'ellipse',Evidence:'ellipse',Experiment:'diamond',Fact:'round-rectangle'};
const EDGE_STYLE={Support:'solid',Rebut:'dashed',DependsOn:'solid',Contradicts:'dotted',Refines:'solid',DerivedFrom:'dashed'};
const EDGE_ARROW={Support:'triangle',Rebut:'triangle',DependsOn:'triangle',Contradicts:'diamond',Refines:'triangle',DerivedFrom:'triangle'};

let nodes=[],edges=[],sel=null,cy=null,currentLayout='dagre';

// Initialize Cytoscape
function initCy(){
  cy=cytoscape({
    container:document.getElementById('cy'),
    style:[
      {selector:'node',style:{
        'label':'data(label)',
        'text-valign':'bottom',
        'text-halign':'center',
        'font-size':'10px',
        'color':'#8b949e',
        'text-margin-y':6,
        'text-max-width':'100px',
        'text-wrap':'ellipsis',
        'width':40,
        'height':40,
        'border-width':2,
        'border-color':'data(color)',
        'background-color':'data(color)',
        'background-opacity':0.85
      }},
      {selector:'node[kind="Claim"]',style:{'shape':'round-rectangle','width':50,'height':36}},
      {selector:'node[kind="Reason"]',style:{'shape':'ellipse','width':40,'height':40}},
      {selector:'node[kind="Evidence"]',style:{'shape':'ellipse','width':36,'height':36}},
      {selector:'node[kind="Experiment"]',style:{'shape':'diamond','width':44,'height':44}},
      {selector:'node[kind="Fact"]',style:{'shape':'round-rectangle','width':46,'height':34}},
      {selector:'node.failed',style:{'border-style':'dashed','opacity':0.5}},
      {selector:'node:selected',style:{'border-color':'#ffffff','border-width':3}},
      {selector:'node.highlighted',style:{'border-color':'#ffffff','border-width':3}},
      {selector:'edge',style:{
        'width':1.5,
        'curve-style':'bezier',
        'target-arrow-shape':'triangle',
        'arrow-scale':0.8,
        'opacity':0.7,
        'label':'data(label)',
        'font-size':'8px',
        'text-rotation':'autorotate',
        'text-margin-y':-8,
        'text-background-color':'#0d1117',
        'text-background-opacity':0.8,
        'text-background-padding':'2px'
      }},
      {selector:'edge[kind="Support"]',style:{'line-color':'#3fb950','target-arrow-color':'#3fb950','color':'#3fb950','line-style':'solid','target-arrow-shape':'triangle'}},
      {selector:'edge[kind="Rebut"]',style:{'line-color':'#f85149','target-arrow-color':'#f85149','color':'#f85149','line-style':'dashed','target-arrow-shape':'triangle'}},
      {selector:'edge[kind="DependsOn"]',style:{'line-color':'#484f58','target-arrow-color':'#484f58','color':'#484f58','line-style':'solid','target-arrow-shape':'triangle'}},
      {selector:'edge[kind="Contradicts"]',style:{'line-color':'#f85149','target-arrow-color':'#f85149','color':'#f85149','line-style':'dotted','target-arrow-shape':'diamond'}},
      {selector:'edge[kind="Refines"]',style:{'line-color':'#58a6ff','target-arrow-color':'#58a6ff','color':'#58a6ff','line-style':'solid','target-arrow-shape':'triangle'}},
      {selector:'edge[kind="DerivedFrom"]',style:{'line-color':'#f0883e','target-arrow-color':'#f0883e','color':'#f0883e','line-style':'dashed','target-arrow-shape':'triangle'}}
    ],
    layout:{name:'preset'},
    wheelSensitivity:0.3,
    minZoom:0.1,
    maxZoom:5
  });

  cy.on('tap','node',function(evt){
    pick(evt.target.id());
  });

  cy.on('tap',function(evt){
    if(evt.target===cy){
      sel=null;
      document.getElementById('panel').style.display='none';
      cy.nodes().removeClass('highlighted');
      renderSide();
    }
  });
}

function buildElements(){
  const elements=[];
  nodes.forEach(function(n){
    const isFailed=n.status==='Rejected'||n.status==='Weakened';
    const lbl=n.statement.length>30?n.statement.substring(0,30)+'...':n.statement;
    elements.push({
      group:'nodes',
      data:{
        id:n.id,
        label:lbl,
        kind:n.kind,
        status:n.status,
        color:KC[n.kind]||'#8b949e',
        statement:n.statement,
        keywords:n.keywords,
        metadata:n.metadata,
        created_at:n.created_at,
        updated_at:n.updated_at
      },
      classes:n.kind+(isFailed?' failed':'')
    });
  });
  edges.forEach(function(e){
    const srcExists=nodes.some(function(n){return n.id===e.source});
    const tgtExists=nodes.some(function(n){return n.id===e.target});
    if(srcExists&&tgtExists){
      elements.push({
        group:'edges',
        data:{
          id:e.id,
          source:e.source,
          target:e.target,
          label:e.kind,
          kind:e.kind,
          weight:e.weight,
          note:e.note,
          created_at:e.created_at
        },
        classes:e.kind
      });
    }
  });
  return elements;
}

function getLayoutOptions(name){
  switch(name){
    case 'dagre':return{name:'dagre',rankDir:'TB',nodeSep:50,rankSep:80,animate:true,animationDuration:300};
    case 'cose':return{name:'cose',animate:true,animationDuration:500,nodeRepulsion:function(){return 8000},idealEdgeLength:function(){return 80},edgeElasticity:function(){return 100},gravity:0.25};
    case 'breadthfirst':return{name:'breadthfirst',directed:true,spacingFactor:1.2,animate:true,animationDuration:300};
    case 'circle':return{name:'circle',animate:true,animationDuration:300};
    default:return{name:'dagre',rankDir:'TB',nodeSep:50,rankSep:80,animate:true,animationDuration:300};
  }
}

function runLayout(name){
  if(!cy||cy.nodes().length===0)return;
  currentLayout=name;
  cy.layout(getLayoutOptions(name)).run();
}

function changeLayout(name){
  currentLayout=name;
  runLayout(name);
}

async function load(){
  const d=await api('/api/graph/all');
  nodes=d.nodes||[];edges=d.edges||[];
  document.getElementById('sn').textContent=nodes.length;
  document.getElementById('se').textContent=edges.length;
  renderSide();

  if(!cy)initCy();

  cy.elements().remove();
  const elements=buildElements();
  if(elements.length>0){
    cy.add(elements);
    runLayout(currentLayout);
  }
}

function renderSide(){
  const groups={};
  nodes.forEach(function(n){var k=n.kind;if(!groups[k])groups[k]=[];groups[k].push(n)});
  var h='';
  var sortedKeys=Object.keys(groups).sort();
  for(var i=0;i<sortedKeys.length;i++){
    var kind=sortedKeys[i];
    var list=groups[kind];
    h+='<h3>'+kind+' ('+list.length+')</h3>';
    var displayList=list.slice(0,30);
    for(var j=0;j<displayList.length;j++){
      var n=displayList[j];
      var c=KC[n.kind]||'#8b949e';
      var isFailed=n.status==='Rejected'||n.status==='Weakened';
      h+='<div class="ni'+(n.id===sel?' sel':'')+'" onclick="pick(\''+n.id+'\')" style="'+(isFailed?'opacity:0.5':'')+'">';
      h+='<div class="dot" style="background:'+c+'"></div>';
      h+='<div class="t">'+n.statement.substring(0,35)+(n.statement.length>35?'...':'')+'</div>';
      h+='<div class="badge">'+n.status+'</div></div>';
    }
    if(list.length>30)h+='<div style="color:#8b949e;font-size:11px;padding:4px">+'+(list.length-30)+' more</div>';
  }
  document.getElementById('sidebar-content').innerHTML=h;
}

function pick(id){
  sel=id;
  renderSide();

  var n=nodes.find(function(x){return x.id===id});
  if(!n)return;

  // Highlight in cytoscape
  cy.nodes().removeClass('highlighted');
  var cyNode=cy.getElementById(id);
  if(cyNode.length>0){
    cyNode.addClass('highlighted');
    cy.animate({center:{eles:cyNode},duration:300});
  }

  var conn=edges.filter(function(e){return e.source===id||e.target===id});
  var p=document.getElementById('panel');
  var h='<h3 style="color:'+(KC[n.kind]||'#ccc')+'">['+n.kind+'] '+n.status+'</h3>';
  h+='<div style="line-height:1.5;margin:8px 0">'+n.statement+'</div>';
  if(n.keywords&&n.keywords.length){
    h+='<div class="kw">'+n.keywords.map(function(k){return'<span>'+k+'</span>'}).join('')+'</div>';
  }
  if(n.metadata&&typeof n.metadata==='object'){
    var m=n.metadata;
    var keys=Object.keys(m).filter(function(k){return k!=='auto_generated'});
    if(keys.length){
      h+='<div style="margin:6px 0;font-size:11px;color:#8b949e">'+keys.map(function(k){return'<b>'+k+'</b>: '+JSON.stringify(m[k]).substring(0,40)}).join('<br>')+'</div>';
    }
  }
  if(n.created_at){
    h+='<div style="margin:4px 0;font-size:11px;color:#484f58">Created: '+new Date(n.created_at).toLocaleDateString()+'</div>';
  }
  h+='<h3 style="margin-top:10px">Connections ('+conn.length+')</h3>';
  for(var i=0;i<conn.length;i++){
    var e=conn[i];
    var oid=e.source===id?e.target:e.source;
    var o=nodes.find(function(x){return x.id===oid});
    var dir=e.source===id?'->':'<-';
    var ec=EC[e.kind]||'#484f58';
    h+='<div class="ei" onclick="pick(\''+oid+'\')" style="border-left:2px solid '+ec+'">'+dir+' <span style="color:'+ec+'">['+e.kind+']</span> '+(o?o.statement.substring(0,30)+'...':oid.substring(0,8))+'</div>';
  }
  h+='<div style="margin-top:10px"><button class="btn b-red" style="font-size:11px" onclick="delNode(\''+id+'\')">Delete</button></div>';
  p.innerHTML=h;
  p.style.display='block';
}

async function delNode(id){
  if(!confirm('Delete?'))return;
  await fetch(API+'/api/graph/node/'+id,{method:'DELETE'});
  sel=null;
  document.getElementById('panel').style.display='none';
  load();
}

// Search
async function doSearch(){
  var q=document.getElementById('q').value.trim();
  var el=document.getElementById('search-results');
  if(!q){el.style.display='none';return}
  var d=await api('/api/graph/search?q='+encodeURIComponent(q)+'&top_k=10');
  var r=d.results||[];
  if(!r.length){el.innerHTML='<div style="color:#8b949e;padding:8px">No results</div>';el.style.display='block';return}
  el.innerHTML='<h3 style="margin-bottom:6px;color:#58a6ff">Results: '+r.length+'</h3>'+r.map(function(x){
    var c=KC[x.kind]||'#8b949e';
    var id=x.node_id||x.id;
    return'<div class="ni" onclick="pick(\''+id+'\')"><div class="dot" style="background:'+c+'"></div><div class="t">'+x.statement.substring(0,35)+'</div><div class="badge">'+((x.score||0).toFixed(2))+'</div></div>';
  }).join('');
  el.style.display='block';
}

// Yahoo
async function addOne(){
  var sym=document.getElementById('ysym').value.trim();
  if(!sym)return;
  document.getElementById('ysym').value='';
  var d=await post('/api/yahoo/fetch',{symbol:sym});
  if(d.error)alert(d.error);else load();
}

async function batchYahoo(){
  var input=prompt('종목 목록 (쉼표 구분):\n예: AAPL,MSFT,GOOGL,AMZN,TSLA,NVDA,META,JPM,KO,XOM,SPY,QQQ');
  if(!input)return;
  var symbols=input.split(',').map(function(s){return s.trim()}).filter(function(s){return s});
  var d=await post('/api/yahoo/batch',{symbols:symbols});
  alert('Created: '+d.n_created+' facts'+(d.errors&&d.errors.length?' / Errors: '+d.errors.length:''));
  load();
}

async function autoOrganize(){
  var d=await post('/api/yahoo/auto-organize',{});
  if(d.error){alert(d.error);return}
  alert('Auto-organized: '+d.claims_created+' claims, '+d.edges_created+' edges created');
  load();
}

load();
</script>
</body>
</html>
