<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>amure-db v2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#0d1117;color:#c9d1d9;height:100vh;overflow:hidden}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#0d1117}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#484f58}

/* Header */
.header{background:#161b22;padding:0 20px;border-bottom:1px solid #30363d;display:flex;align-items:center;gap:12px;height:48px;flex-shrink:0}
.header h1{font-size:17px;color:#58a6ff;cursor:pointer;white-space:nowrap;user-select:none}
.header h1:hover{color:#79c0ff}
.search-box{background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:6px 12px;border-radius:6px;font-size:14px;width:320px;transition:border-color .2s}
.search-box:focus{outline:none;border-color:#58a6ff}
.hdr-stats{font-size:13px;color:#8b949e;margin-left:auto;display:flex;gap:14px;white-space:nowrap}
.hdr-stats span{color:#58a6ff}
.btn{padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:opacity .15s}
.btn:hover{opacity:0.85}
.b-blue{background:#1f6feb;color:#fff}
.b-green{background:#238636;color:#fff}
.b-red{background:#da3633;color:#fff}
.b-ghost{background:transparent;color:#8b949e;border:1px solid #30363d}
.b-ghost:hover{color:#c9d1d9;border-color:#484f58}

/* Layout */
.layout{display:flex;height:calc(100vh - 48px);overflow:hidden}

/* Sidebar */
.sidebar{width:260px;background:#161b22;border-right:1px solid #30363d;overflow-y:auto;flex-shrink:0;padding:12px;display:flex;flex-direction:column;gap:4px}
.sidebar-section-title{font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:.5px;padding:10px 0 4px;font-weight:600}
.toc-item{padding:6px 10px;border-radius:5px;cursor:pointer;font-size:13px;color:#c9d1d9;text-decoration:none;display:flex;align-items:center;gap:6px;transition:background .15s}
.toc-item:hover{background:#1f6feb22}
.toc-item .toc-count{margin-left:auto;font-size:11px;color:#8b949e;background:#21262d;padding:1px 6px;border-radius:8px}
.toc-item .toc-dot{width:4px;height:16px;border-radius:2px;flex-shrink:0}
.recent-item{padding:5px 10px;border-radius:5px;cursor:pointer;font-size:12px;color:#8b949e;display:flex;align-items:center;gap:6px;transition:background .15s;overflow:hidden}
.recent-item:hover{background:#1f6feb22;color:#c9d1d9}
.recent-item .ri-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.recent-item .ri-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sidebar-kind-stat{padding:6px 10px;font-size:13px;display:flex;align-items:center;gap:8px}
.sidebar-kind-stat .sk-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sidebar-kind-stat .sk-count{margin-left:auto;color:#8b949e;font-size:12px}

/* Main content */
.main-content{flex:1;overflow-y:auto;padding:0}
.content-inner{max-width:900px;margin:0 auto;padding:24px 32px 60px}

/* Breadcrumb */
.breadcrumb{display:flex;align-items:center;gap:4px;font-size:12px;color:#8b949e;margin-bottom:16px;flex-wrap:wrap}
.breadcrumb a{color:#58a6ff;cursor:pointer;text-decoration:none}
.breadcrumb a:hover{text-decoration:underline}
.breadcrumb .bc-sep{color:#484f58}

/* Nav buttons */
.nav-bar{display:flex;align-items:center;gap:6px;margin-bottom:12px}
.nav-btn{background:#21262d;border:1px solid #30363d;color:#8b949e;padding:4px 10px;border-radius:5px;cursor:pointer;font-size:12px;transition:all .15s}
.nav-btn:hover{color:#c9d1d9;border-color:#484f58}
.nav-btn:disabled{opacity:.3;cursor:default}

/* Home view */
.home-search{text-align:center;padding:60px 0 40px}
.home-search h2{font-size:24px;color:#c9d1d9;margin-bottom:16px;font-weight:400}
.home-search-input{background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:12px 20px;border-radius:8px;font-size:16px;width:100%;max-width:560px;transition:border-color .2s}
.home-search-input:focus{outline:none;border-color:#58a6ff}

/* Node card (list item) */
.node-card{display:flex;align-items:center;gap:10px;padding:10px 12px;margin:2px 0;border-radius:6px;cursor:pointer;border:1px solid transparent;transition:all .15s}
.node-card:hover{background:#161b22;border-color:#30363d}
.node-card .nc-statement{flex:1;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.node-card .nc-status{font-size:10px;padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.node-card .nc-exp{font-size:10px;color:#8b949e;background:#21262d;padding:1px 5px;border-radius:3px;flex-shrink:0}

/* Search result card */
.search-result-card{display:flex;align-items:center;gap:10px;padding:10px 12px;margin:2px 0;border-radius:6px;cursor:pointer;border:1px solid transparent;transition:all .15s}
.search-result-card:hover{background:#161b22;border-color:#30363d}
.search-result-card .src-score{font-size:11px;background:#1f6feb33;color:#58a6ff;padding:2px 8px;border-radius:10px;flex-shrink:0}

/* Wiki page */
.wiki-header{margin-bottom:24px}
.wiki-badges{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.wiki-kind-badge{font-size:13px;font-weight:700;padding:4px 12px;border-radius:5px}
.wiki-status-badge{font-size:12px;padding:3px 10px;border-radius:12px;font-weight:500}
.wiki-title{font-size:22px;font-weight:600;line-height:1.4;margin:12px 0 8px;color:#e6edf3}
.wiki-meta{font-size:12px;color:#8b949e;display:flex;flex-direction:column;gap:4px;margin-top:8px}
.wiki-meta-row{display:flex;gap:16px;flex-wrap:wrap}
.wiki-abstract{margin-top:12px;background:#161b22;border:1px solid #30363d;border-radius:6px;padding:12px;font-size:14px;line-height:1.6;color:#c9d1d9}
.wiki-abstract .wa-label{font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;font-weight:600}
.wiki-discussion{margin-top:12px;background:#161b22;border:1px solid #21262d;border-radius:6px;padding:12px;font-size:13px;line-height:1.6;color:#8b949e}
.wiki-discussion .wd-label{font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;font-weight:600}

.wiki-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.status-select{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:4px 8px;border-radius:5px;font-size:12px;cursor:pointer}
.status-select:focus{outline:none;border-color:#58a6ff}

/* Wiki section */
.wiki-section{margin-top:28px}
.wiki-section-heading{font-size:16px;font-weight:600;color:#e6edf3;padding:8px 0;border-left:3px solid #30363d;padding-left:12px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.wiki-section-heading .ws-count{font-size:12px;color:#8b949e;font-weight:400}
.wiki-section-heading[data-color]{border-left-color:var(--section-color)}

/* Experiment card */
.exp-card{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;margin:6px 0;border-radius:8px;background:#161b22;border:1px solid #21262d;border-left:4px solid #484f58;transition:all .15s}
.exp-card .ec-kind{font-size:10px;font-weight:600;padding:2px 6px;border-radius:3px;flex-shrink:0;color:#d2a8ff;background:#d2a8ff18}
.exp-card .ec-verdict{font-size:10px;font-weight:600;padding:2px 8px;border-radius:8px;flex-shrink:0}
.exp-card .ec-body{flex:1;min-width:0}
.exp-card .ec-target{font-size:14px;color:#c9d1d9}
.exp-card .ec-note{font-size:12px;color:#484f58;margin-top:4px;font-style:italic}
.exp-card .ec-result{font-size:12px;color:#8b949e;margin-top:4px;font-family:monospace}

/* Connected node item */
.conn-item{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;margin:6px 0;border-radius:8px;cursor:pointer;background:#161b22;border:1px solid #21262d;border-left:4px solid #30363d;transition:all .15s}
.conn-item:hover{border-color:#30363d;background:#1c2128;border-left-color:#484f58}
.conn-item .ci-body{flex:1;min-width:0}
.conn-item .ci-statement{font-size:14px;color:#c9d1d9;line-height:1.5}
.conn-item .ci-reason{font-size:12px;color:#484f58;margin-top:4px;font-style:italic}

/* Status visual indicators */
.status-indicator{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:3px 10px;border-radius:12px;font-weight:600}
.status-indicator.st-draft{color:#8b949e;background:#8b949e22}
.status-indicator.st-accept{color:#3fb950;background:#3fb95022}
.status-indicator.st-decline{color:#f85149;background:#f8514922}

/* Responsive */
@media(max-width:768px){
  .sidebar{display:none}
  .content-inner{padding:16px}
  .header{gap:8px;padding:0 12px}
  .search-box{width:180px}
  .wiki-title{font-size:18px}
}
@media(max-width:480px){
  .hdr-stats{display:none}
  .search-box{width:140px}
}
</style>
</head>
<body>

<div class="header">
  <h1 onclick="goHome()">amure-db</h1>
  <input class="search-box" id="q" placeholder="Embedding 검색..." onkeydown="if(event.key==='Enter')doSearch()">
  <select id="status-filter" style="background:#0d1117;border:1px solid #30363d;color:#8b949e;padding:6px 10px;border-radius:6px;font-size:13px;cursor:pointer">
    <option value="">전체 상태</option>
    <option value="Draft">Draft</option>
    <option value="Accept">Accept</option>
    <option value="Decline">Decline</option>
  </select>
  <button class="btn b-blue" onclick="doSearch()">검색</button>
  <div class="hdr-stats">
    <div>노드 <span id="sn">0</span></div>
    <div>엣지 <span id="se">0</span></div>
  </div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-content" id="main">
    <div class="content-inner" id="content"></div>
  </div>
</div>

<script>
const API='';
const SC={Draft:'#8b949e',Accept:'#3fb950',Decline:'#f85149'};
const STATUS_ICONS={Draft:'&#9675;',Accept:'&#10003;',Decline:'&#10007;'};
const EKC={Reference:'#58a6ff',Superset:'#d2a8ff',Subset:'#f0883e',Orthogonal:'#484f58'};
const EDGE_LABELS={Reference:'참조',Superset:'상위',Subset:'하위',Orthogonal:'직교'};

let allNodes=[], allEdges=[];
let history=[], historyIdx=-1;
let recentVisits=[];
let currentView='home';
let currentNodeId=null;

// --- API helpers ---
async function api(p){const r=await fetch(API+p);return r.json()}
async function post(p,b){return(await fetch(API+p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)})).json()}
async function patch(p,b){return(await fetch(API+p,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)})).json()}
async function del(p){return fetch(API+p,{method:'DELETE'})}

// --- Data ---
async function loadAll(){
  const d=await api('/api/graph/all');
  allNodes=d.nodes||[];
  allEdges=d.edges||[];
  document.getElementById('sn').textContent=allNodes.length;
  document.getElementById('se').textContent=allEdges.length;
}

function findNode(id){return allNodes.find(n=>n.id===id)}
function getEdgesFor(id){return allEdges.filter(e=>e.source===id||e.target===id)}

// --- Navigation ---
function navigate(nodeId, pushHistory){
  if(pushHistory!==false){
    if(historyIdx<history.length-1) history=history.slice(0,historyIdx+1);
    history.push(nodeId);
    historyIdx=history.length-1;
  }
  if(nodeId===null){
    currentView='home';
    currentNodeId=null;
    window.location.hash='';
    renderHome();
    renderSidebar();
  } else {
    currentView='node';
    currentNodeId=nodeId;
    window.location.hash=nodeId;
    addRecentVisit(nodeId);
    renderNodePage(nodeId).catch(e=>{
      document.getElementById('content').innerHTML='<div style="padding:40px;color:#f85149">Error: '+e.message+'</div>';
    });
    renderSidebar();
  }
  document.getElementById('main').scrollTop=0;
}

function goHome(){navigate(null,true)}
function goBack(){if(historyIdx>0){historyIdx--;navigate(history[historyIdx],false)}}
function goForward(){if(historyIdx<history.length-1){historyIdx++;navigate(history[historyIdx],false)}}

function addRecentVisit(id){
  recentVisits=recentVisits.filter(r=>r!==id);
  recentVisits.unshift(id);
  if(recentVisits.length>10) recentVisits=recentVisits.slice(0,10);
}

// --- Hash routing ---
window.addEventListener('hashchange',function(){
  const h=window.location.hash.slice(1);
  if(h && h!==currentNodeId) navigate(h,true);
  else if(!h && currentView!=='home' && currentView!=='search') navigate(null,true);
});

// --- Render: Sidebar ---
function renderSidebar(){
  const sb=document.getElementById('sidebar');
  let h='';
  if(currentView==='node' && currentNodeId){
    h+=renderSidebarTOC(currentNodeId);
  } else {
    h+=renderSidebarStatusStats();
  }
  h+=renderSidebarRecent();
  sb.innerHTML=h;
}

function renderSidebarStatusStats(){
  const counts={Draft:0,Accept:0,Decline:0};
  allNodes.forEach(n=>{if(counts[n.status]!==undefined)counts[n.status]++});
  let h='<div class="sidebar-section-title">Status</div>';
  for(const st of ['Draft','Accept','Decline']){
    h+='<div class="sidebar-kind-stat"><div class="sk-dot" style="background:'+SC[st]+'"></div>'+st+'<span class="sk-count">'+counts[st]+'</span></div>';
  }
  let totalExp=0;
  allNodes.forEach(n=>{totalExp+=(n.n_experiments||0)});
  h+='<div class="sidebar-kind-stat"><div class="sk-dot" style="background:#d2a8ff"></div>Experiments<span class="sk-count">'+totalExp+'</span></div>';
  return h;
}

function renderSidebarTOC(nodeId){
  const node=findNode(nodeId);
  if(!node) return '';
  let h='<div class="sidebar-section-title">Contents</div>';
  h+='<a class="toc-item" href="#sec-info" onclick="scrollToSection(\'sec-info\');return false"><div class="toc-dot" style="background:#58a6ff"></div>Info</a>';
  if(node.experiments && node.experiments.length>0){
    h+='<a class="toc-item" href="#sec-exp" onclick="scrollToSection(\'sec-exp\');return false"><div class="toc-dot" style="background:#d2a8ff"></div>Experiments<span class="toc-count">'+node.experiments.length+'</span></a>';
  }
  h+='<a class="toc-item" href="#sec-edges" onclick="scrollToSection(\'sec-edges\');return false"><div class="toc-dot" style="background:#58a6ff"></div>Edges</a>';
  return h;
}

function renderSidebarRecent(){
  if(recentVisits.length===0) return '';
  let h='<div class="sidebar-section-title" style="margin-top:16px">Recent</div>';
  for(const id of recentVisits){
    const n=findNode(id);
    if(!n) continue;
    const c=SC[n.status]||'#8b949e';
    h+='<div class="recent-item" onclick="navigate(\''+n.id+'\',true)">';
    h+='<div class="ri-dot" style="background:'+c+'"></div>';
    h+='<div class="ri-text">'+esc(n.statement.substring(0,40))+(n.statement.length>40?'...':'')+'</div></div>';
  }
  return h;
}

function scrollToSection(id){
  const el=document.getElementById(id);
  if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
}

// --- Render: Home ---
function renderHome(){
  const c=document.getElementById('content');
  let h='';
  h+='<div class="home-search">';
  h+='<h2>amure-db v2</h2>';
  h+='<input class="home-search-input" placeholder="Search hypotheses..." onkeydown="if(event.key===\'Enter\'){document.getElementById(\'q\').value=this.value;doSearch()}">';
  h+='</div>';

  const statusFilter=document.getElementById('status-filter').value;
  let filtered=allNodes;
  if(statusFilter) filtered=filtered.filter(n=>n.status===statusFilter);

  // Group by status
  const groups={Accept:[],Decline:[],Draft:[]};
  filtered.forEach(n=>{if(groups[n.status])groups[n.status].push(n)});

  for(const st of ['Accept','Decline','Draft']){
    const list=groups[st]||[];
    if(list.length===0) continue;
    h+='<div style="margin-bottom:8px;padding:10px 0;border-bottom:1px solid #21262d;display:flex;align-items:center;gap:8px">';
    h+='<div style="width:10px;height:10px;border-radius:50%;background:'+SC[st]+'"></div>';
    h+='<span style="font-size:15px;font-weight:600">'+st+'</span>';
    h+='<span style="font-size:13px;color:#8b949e">('+list.length+')</span></div>';
    const show=list.slice(0,50);
    for(const n of show) h+=renderNodeCard(n);
    if(list.length>50) h+='<div style="padding:8px 12px;color:#8b949e;font-size:13px">+ '+(list.length-50)+' more...</div>';
  }
  c.innerHTML=h;
}

function renderNodeCard(n){
  const sc=SC[n.status]||'#8b949e';
  const icon=STATUS_ICONS[n.status]||'';
  let h='<div class="node-card" onclick="navigate(\''+n.id+'\',true)">';
  h+='<span class="nc-status" style="color:'+sc+';background:'+sc+'22">'+icon+' '+n.status+'</span>';
  h+='<span class="nc-statement">'+esc(n.statement.substring(0,70))+(n.statement.length>70?'...':'')+'</span>';
  if(n.n_experiments>0) h+='<span class="nc-exp">'+n.n_experiments+' exp</span>';
  h+='</div>';
  return h;
}

// --- Render: Search ---
async function doSearch(){
  const q=document.getElementById('q').value.trim();
  if(!q){goHome();return}
  const status=document.getElementById('status-filter').value;
  let url='/api/graph/search?q='+encodeURIComponent(q)+'&top_k=10&include_decline=true';
  if(status) url+='&status='+encodeURIComponent(status);
  const d=await api(url);
  const results=d.results||[];
  currentView='search';
  renderSidebar();
  const c=document.getElementById('content');
  let h=renderNavBar();
  h+='<h2 style="font-size:18px;margin-bottom:16px;color:#e6edf3">Search: "'+esc(q)+'" <span style="color:#8b949e;font-size:14px">('+results.length+')</span></h2>';
  if(results.length===0){
    h+='<div style="color:#8b949e;padding:20px 0">No results. Embedding required for search.</div>';
  } else {
    for(const r of results){
      const sc=SC[r.status]||'#8b949e';
      const icon=STATUS_ICONS[r.status]||'';
      h+='<div class="search-result-card" onclick="navigate(\''+(r.node_id||r.id)+'\',true)">';
      h+='<span class="src-score">'+(r.score||0).toFixed(3)+'</span>';
      h+='<span class="nc-status" style="color:'+sc+';background:'+sc+'22;font-size:10px;padding:2px 8px;border-radius:10px">'+icon+' '+r.status+'</span>';
      h+='<span style="flex:1;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(r.statement)+'</span>';
      h+='</div>';
    }
  }
  c.innerHTML=h;
}

// --- Render: Node Page ---
async function renderNodePage(nodeId){
  const c=document.getElementById('content');
  c.innerHTML='<div style="padding:40px;color:#8b949e">Loading...</div>';

  let node=findNode(nodeId);
  let edgesData;
  try{
    const detail=await api('/api/graph/node/'+nodeId);
    if(detail.node) node=detail.node;
    edgesData=detail.edges||[];
  } catch(e){
    edgesData=getEdgesFor(nodeId).map(e=>{
      const otherId=e.source===nodeId?e.target:e.source;
      const other=findNode(otherId);
      return{...e,other_statement:other?other.statement:''};
    });
  }

  if(!node){c.innerHTML='<div style="padding:40px;color:#8b949e">Node not found.</div>';return}

  const sc=SC[node.status]||'#8b949e';
  const icon=STATUS_ICONS[node.status]||'';
  let h=renderNavBar();
  h+=renderBreadcrumb();

  // Header
  h+='<div class="wiki-header" id="sec-info">';
  h+='<div class="wiki-badges">';
  h+='<span class="wiki-kind-badge" style="color:#58a6ff;background:#58a6ff18;border:1px solid #58a6ff33">Hypothesis</span>';
  h+='<span class="status-indicator st-'+node.status.toLowerCase()+'">'+icon+' '+node.status+'</span>';
  h+='</div>';
  h+='<div class="wiki-title">'+esc(node.statement)+'</div>';

  // Abstract
  if(node.abstract_ && node.abstract_.length>0){
    h+='<div class="wiki-abstract"><div class="wa-label">Abstract</div>'+esc(node.abstract_)+'</div>';
  }

  // Discussion
  if(node.discussion && node.discussion.length>0){
    h+='<div class="wiki-discussion"><div class="wd-label">Discussion</div>'+esc(node.discussion)+'</div>';
  }

  // Dates
  h+='<div class="wiki-meta"><div class="wiki-meta-row">';
  if(node.created_at) h+='<span>Created: '+formatDate(node.created_at)+'</span>';
  if(node.updated_at) h+='<span>Updated: '+formatDate(node.updated_at)+'</span>';
  h+='</div></div>';

  // Actions
  h+='<div class="wiki-actions">';
  h+='<select class="status-select" onchange="changeStatus(\''+nodeId+'\',this.value)">';
  for(const s of ['Draft','Accept','Decline']){
    h+='<option value="'+s+'"'+(node.status===s?' selected':'')+'>'+s+'</option>';
  }
  h+='</select>';
  h+='<button class="btn b-red" style="font-size:12px;padding:4px 12px" onclick="deleteNode(\''+nodeId+'\')">Delete</button>';
  h+='</div>';
  h+='</div>'; // end wiki-header

  // Experiments section
  const experiments=node.experiments||[];
  if(experiments.length>0){
    h+='<div class="wiki-section" id="sec-exp">';
    h+='<div class="wiki-section-heading" style="--section-color:#d2a8ff" data-color>Experiments <span class="ws-count">('+experiments.length+')</span></div>';
    for(const exp of experiments){
      const vc=exp.verdict==='Support'?'#3fb950':'#f85149';
      h+='<div class="exp-card" style="border-left-color:'+vc+'">';
      h+='<span class="ec-kind">'+exp.kind+'</span>';
      h+='<div class="ec-body">';
      h+='<div class="ec-target">'+esc(exp.target)+'</div>';
      h+='<span class="ec-verdict" style="color:'+vc+';background:'+vc+'22">'+exp.verdict+'</span>';
      if(exp.result){
        let rs=typeof exp.result==='string'?exp.result:JSON.stringify(exp.result);
        if(rs.length>100) rs=rs.substring(0,100)+'...';
        h+='<div class="ec-result">'+esc(rs)+'</div>';
      }
      if(exp.note) h+='<div class="ec-note">'+esc(exp.note)+'</div>';
      h+='</div></div>';
    }
    h+='</div>';
  }

  // Edges section
  h+='<div class="wiki-section" id="sec-edges">';
  h+='<div class="wiki-section-heading" style="--section-color:#58a6ff" data-color>Edges <span class="ws-count">('+edgesData.length+')</span></div>';
  if(edgesData.length===0){
    h+='<div style="color:#8b949e;font-size:13px;padding:8px">No connected edges.</div>';
  }
  for(const e of edgesData){
    const isSource=e.source===nodeId;
    const otherId=isSource?e.target:e.source;
    const otherNode=findNode(otherId);
    const otherStmt=e.other_statement||(otherNode?otherNode.statement:otherId.substring(0,8)+'...');
    const ekc=EKC[e.kind]||'#484f58';
    const dir=isSource?'->':'<-';
    h+='<div class="conn-item" style="border-left-color:'+ekc+'" onclick="navigate(\''+otherId+'\',true)">';
    h+='<div style="display:flex;align-items:center;gap:6px;flex-shrink:0">';
    h+='<span style="font-size:10px;font-weight:600;padding:2px 6px;border-radius:3px;color:'+ekc+';background:'+ekc+'18">'+e.kind+'</span>';
    h+='<span style="font-size:11px;color:#484f58">'+dir+'</span>';
    h+='</div>';
    h+='<div class="ci-body">';
    h+='<div class="ci-statement">'+esc(otherStmt)+'</div>';
    if(e.reason) h+='<div class="ci-reason">'+esc(e.reason)+'</div>';
    h+='</div></div>';
  }
  h+='</div>';

  c.innerHTML=h;
}

// --- Nav bar ---
function renderNavBar(){
  let h='<div class="nav-bar">';
  h+='<button class="nav-btn" onclick="goBack()"'+(historyIdx<=0?' disabled':'')+'>Back</button>';
  h+='<button class="nav-btn" onclick="goForward()"'+(historyIdx>=history.length-1?' disabled':'')+'>Forward</button>';
  h+='<button class="nav-btn" onclick="goHome()">Home</button>';
  h+='</div>';
  return h;
}

function renderBreadcrumb(){
  if(history.length<=1) return '';
  const show=history.slice(Math.max(0,historyIdx-4),historyIdx+1);
  let h='<div class="breadcrumb">';
  h+='<a onclick="goHome()">Home</a><span class="bc-sep">/</span>';
  for(let i=0;i<show.length;i++){
    const id=show[i];
    if(!id) continue;
    const n=findNode(id);
    const label=n?n.statement.substring(0,20)+(n.statement.length>20?'...':''):id.substring(0,8);
    if(i===show.length-1){
      h+='<span style="color:#c9d1d9">'+esc(label)+'</span>';
    } else {
      h+='<a onclick="navigate(\''+id+'\',true)">'+esc(label)+'</a><span class="bc-sep">/</span>';
    }
  }
  h+='</div>';
  return h;
}

// --- Actions ---
async function changeStatus(nodeId, status){
  await patch('/api/graph/node/'+nodeId,{status:status});
  await loadAll();
  renderNodePage(nodeId).catch(e=>{
    document.getElementById('content').innerHTML='<div style="padding:40px;color:#f85149">Error: '+e.message+'</div>';
  });
  renderSidebar();
}

async function deleteNode(nodeId){
  if(!confirm('Delete this node?')) return;
  await del('/api/graph/node/'+nodeId);
  await loadAll();
  goHome();
}

// --- Utilities ---
function esc(s){
  if(!s) return '';
  const d=document.createElement('div');
  d.textContent=s;
  return d.innerHTML;
}

function formatDate(d){
  if(!d) return '';
  const dt=new Date(d);
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0')+' '+String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0');
}

// --- Init ---
async function init(){
  await loadAll();
  const hash=window.location.hash.slice(1);
  if(hash) navigate(hash,true);
  else navigate(null,true);
  document.getElementById('status-filter').addEventListener('change',function(){
    if(currentView==='home') renderHome();
  });
}

init();
</script>
